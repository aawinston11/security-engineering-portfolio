---
# Ansible Inventory for Linux Hardening Phase 1
# Example inventory - customize for your environment

all:
  children:
    linux_servers:
      hosts:
        ubuntu-server-01:
          ansible_host: 192.168.1.10
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
          # ansible_ssh_pass: password  # Only for initial setup, remove after key-based auth
        ubuntu-server-02:
          ansible_host: 192.168.1.11
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_rsa
      vars:
        ansible_python_interpreter: /usr/bin/python3
        # Global variables
        ssh_port: 22
        ssh_allowed_users: "{{ ansible_user }}"
        fail2ban_ban_time: 3600
        fail2ban_findtime: 600
        fail2ban_maxretry: 3
