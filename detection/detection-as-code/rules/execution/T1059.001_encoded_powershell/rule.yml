title: Encoded PowerShell Command Execution
id: 8a3f6c1e-1059-4001-aaaa-encodedps01
status: experimental
description: |
  Detects PowerShell launched with the -EncodedCommand or -enc flag, commonly used by
  attackers to obscure malicious payloads (encoded base64) and bypass naive content-based
  detections.
references:
  - https://attack.mitre.org/techniques/T1059/001/
  - https://redcanary.com/threat-detection-report/techniques/powershell/
author: synthetic-portfolio
date: 2026/04/22
tags:
  - attack.execution
  - attack.t1059.001
  - attack.defense_evasion
  - attack.t1027
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - ' -enc '
      - ' -EncodedCommand '
      - ' -EC '
      - ' -e '
  condition: selection
falsepositives:
  - Some legitimate automation/installer tools use encoded commands. Investigate parent process
    and command origin (taskeng.exe scheduled-task runs are usually expected).
level: high
