---
# Example Ansible inventory for the Linux hardening role.
# IPs use the RFC 5737 documentation range (203.0.113.0/24, TEST-NET-3).
# Replace with your target VM's address before running.

all:
  children:
    linux_servers:
      hosts:
        ubuntu-server-01:
          ansible_host: 203.0.113.10
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
        ubuntu-server-02:
          ansible_host: 203.0.113.11
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
      vars:
        ansible_python_interpreter: /usr/bin/python3
        ssh_port: 22
        ssh_allowed_users: "{{ ansible_user }}"
        fail2ban_ban_time: 3600
        fail2ban_findtime: 600
        fail2ban_maxretry: 3
