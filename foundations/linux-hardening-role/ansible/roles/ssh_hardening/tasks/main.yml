---
# SSH Hardening Role

- name: Install OpenSSH server (if not present)
  apt:
    name: openssh-server
    state: present

- name: Backup SSH configuration
  copy:
    src: /etc/ssh/sshd_config
    dest: /etc/ssh/sshd_config.bak
    remote_src: yes
  when: ansible_check_mode | bool == false

- name: Configure SSH daemon settings
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^{{ item.regexp }}"
    line: "{{ item.line }}"
    backup: yes
  loop:
    - { regexp: '^#?Port', line: 'Port {{ ssh_port }}' }
    - { regexp: '^#?Protocol', line: 'Protocol 2' }
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
    - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords no' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
    - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
    - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
    - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
    - { regexp: '^#?Banner', line: 'Banner /etc/issue.net' }
    - { regexp: '^#?UsePAM', line: 'UsePAM yes' }
    - { regexp: '^#?AllowUsers', line: 'AllowUsers {{ ssh_allowed_users }}' }
  notify: restart sshd

- name: Create SSH banner file
  copy:
    content: |
      WARNING: Unauthorized access to this system is prohibited.
      All access attempts are logged and monitored.
    dest: /etc/issue.net
    owner: root
    group: root
    mode: '0644'

- name: Verify SSH configuration syntax
  command: sshd -t
  register: sshd_config_test
  changed_when: false
  failed_when: sshd_config_test.rc != 0

- name: Display SSH configuration summary
  debug:
    msg:
      - "SSH hardening applied"
      - "Port: {{ ssh_port }}"
      - "Password auth: DISABLED"
      - "Root login: DISABLED"
      - "Key-based auth: ENABLED"
